<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Museum des Spielens – Museum 2.0</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="header"></div>

<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);
</script>

<div class="container">

    <script>

   <style>
.login-box {
    max-width: 400px;
    margin: 80px auto;
    padding: 30px;
    background: white;
    border: 1px solid #ddd;
    border-top: 5px solid #C00000;
    text-align: center;
}

.login-box h2 {
    margin-bottom: 20px;
    color: #C00000;
}

.login-box input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
}

.login-box button {
    background-color: #C00000;
    color: white;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
}

.login-box button:hover {
    background-color: #a00000;
}

.error {
    color: red;
    margin-top: 10px;
    display: none;
}
</style>

</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Benutzername">
    <input type="password" id="password" placeholder="Passwort">

    <button onclick="login()">Login</button>

    <div class="error" id="errorMsg">Zugangsdaten falsch.</div>
</div>

<script>

function login() {
    let user = document.getElementById("username").value;
    let pw = document.getElementById("password").value;

    if (user === "kurator" && pw === "spielkultur") {
        window.location.href = "backoffice.html";
    } else {
        document.getElementById("errorMsg").style.display = "block";
    }
}

</script>


<div class="footer">
    Museum des Spielens – Entwicklung • Kultur • Lernen • Bedeutung
</div>



</body>
</html>
